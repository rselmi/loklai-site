name: Minifica e Publica no Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixa código
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instala minificadores
        run: npm install -g html-minifier-terser clean-css-cli terser

      - name: Minifica
        run: |
          find . -type f -name "*.html" -not -path "./.git/*" -not -path "./.github/*" -exec html-minifier-terser --collapse-whitespace --remove-comments --remove-redundant-attributes --minify-css true --minify-js true -o {} {} \;
          find . -type f -name "*.css" -not -path "./.git/*" -exec cleancss -o {} {} \;
          find . -type f -name "*.js" -not -path "./.git/*" -exec terser {} --compress --mangle -o {} \;

      - name: Publica
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
