name: Minifica e Publica no Pages

on:
  push:
    branches: [ main ]  # se seu branch principal chama 'master', troque aqui

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Baixa o código
        uses: actions/checkout@v4

      - name: 2. Instala Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Instala minificadores
        run: npm install -g html-minifier-terser clean-css-cli terser

      - name: 4. Minifica HTML
        run: |
          find . -type f -name "*.html" -not -path "./.git/*" -not -path "./.github/*" \
          -exec html-minifier-terser --collapse-whitespace --remove-comments --remove-redundant-attributes --remove-empty-attributes --minify-css true --minify-js true -o {} {} \;

      - name: 5. Minifica CSS
        run: |
          find . -type f -name "*.css" -not -path "./.git/*" \
          -exec cleancss -o {} {} \;

      - name: 6. Minifica JS
        run: |
          find . -type f -name "*.js" -not -path "./.git/*" \
          -exec terser {} --compress --mangle -o {} \;

      - name: 7. Publica no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          force_orphan: true
          keep_files: false
